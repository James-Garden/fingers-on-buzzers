version: "2"

linters:
  # Defaults are errcheck, govet, ineffassign, staticcheck, unused.
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
        - name: unexported-return
        - name: context-as-argument
          arguments:
            - allowTypesBefore: "*testing.T"
        - name: error-strings
        - name: indent-error-flow
        - name: unreachable-code
        - name: var-naming

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go$
        linters:
          - bodyclose
          - noctx

formatters:
  enable:
    - gofumpt
    - goimports
